name: CI

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore EmbeddedSass.Net.slnx

      - name: Build
        run: >-
          dotnet build EmbeddedSass.Net.slnx
          --configuration Release
          --no-restore
          --disable-build-servers
          -m:1

      - name: Pack NuGet packages
        shell: bash
        run: |
          projects=(
            src/EmbeddedSass.Net/EmbeddedSass.Net.csproj
            src/EmbeddedSass.Net.DependencyInjection/EmbeddedSass.Net.DependencyInjection.csproj
            src/EmbeddedSass.Net.Compiler/EmbeddedSass.Net.Compiler.csproj
            src/EmbeddedSass.Net.MsBuild/EmbeddedSass.Net.MsBuild.csproj
          )

          for project in "${projects[@]}"; do
            dotnet pack "$project" \
              --configuration Release \
              --no-build \
              --output artifacts/packages
          done

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages/*.*nupkg
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore EmbeddedSass.Net.slnx

      - name: Test
        run: >-
          dotnet test EmbeddedSass.Net.slnx
          --configuration Release
          --no-restore
          --disable-build-servers
          -m:1

  deploy:
    name: Publish to NuGet.org
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages

      - name: Publish NuGet packages
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [[ -z "$NUGET_API_KEY" ]]; then
            echo "The NUGET_API_KEY GitHub Actions secret is required." >&2
            exit 1
          fi

          dotnet nuget push "artifacts/packages/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --symbol-source https://api.nuget.org/v3/index.json \
            --symbol-api-key "$NUGET_API_KEY" \
            --skip-duplicate
